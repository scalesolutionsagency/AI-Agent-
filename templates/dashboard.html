<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lead Scraper Agent</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }
        }

        .card {
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }

        .card h2 {
            color: #333;
            margin-bottom: 20px;
            font-size: 1.5em;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
        }

        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1em;
            font-family: inherit;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 5px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .status {
            padding: 15px;
            border-radius: 5px;
            margin-top: 15px;
            font-weight: 500;
        }

        .status.running {
            background: #e3f2fd;
            color: #1976d2;
        }

        .status.success {
            background: #e8f5e9;
            color: #388e3c;
        }

        .status.error {
            background: #ffebee;
            color: #c62828;
        }

        .leads-list {
            max-height: 500px;
            overflow-y: auto;
        }

        .lead-item {
            padding: 15px;
            border: 1px solid #eee;
            border-radius: 5px;
            margin-bottom: 10px;
            background: #f9f9f9;
        }

        .lead-item h3 {
            color: #333;
            margin-bottom: 8px;
        }

        .lead-info {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            font-size: 0.9em;
            color: #666;
        }

        .lead-label {
            font-weight: 600;
            color: #555;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .download-btn {
            background: #4caf50;
            margin-top: 10px;
        }

        .download-btn:hover {
            background: #45a049;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 20px;
        }

        .stat {
            text-align: center;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 5px;
        }

        .stat-value {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }

        .stat-label {
            font-size: 0.9em;
            color: #666;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🔍 Lead Scraper Agent</h1>
            <p>Find and manage business leads with ease</p>
        </header>

        <div class="grid">
            <!-- Search Form -->
            <div class="card">
                <h2>Search Parameters</h2>
                <form id="searchForm">
                    <div class="form-group">
                        <label for="businessType">Business Type</label>
                        <input type="text" id="businessType" value="Plumbers" placeholder="e.g., Plumbers, HVAC, Dentists">
                    </div>
                    <div class="form-group">
                        <label for="location">Location</label>
                        <input type="text" id="location" value="Austin, TX" placeholder="e.g., Austin, TX">
                    </div>
                    <div class="form-group">
                        <label for="limit">Number of Results</label>
                        <input type="number" id="limit" value="50" min="10" max="200">
                    </div>
                    <button type="submit" id="searchBtn">🚀 Start Scraping</button>
                    <div id="status" class="status" style="display: none;"></div>
                </form>

                <div class="stats">
                    <div class="stat">
                        <div class="stat-value" id="leadsCount">0</div>
                        <div class="stat-label">Leads Found</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value" id="lastRunTime">-</div>
                        <div class="stat-label">Last Run</div>
                    </div>
                </div>
            </div>

            <!-- Results -->
            <div class="card">
                <h2>Results</h2>
                <div class="leads-list" id="leadsList">
                    <p style="color: #999; text-align: center;">No leads yet. Start a search to begin!</p>
                </div>
                <button class="download-btn" id="downloadBtn" style="display: none;">⬇️ Download as JSON</button>
            </div>
        </div>
    </div>

    <script>
        const searchForm = document.getElementById('searchForm');
        const statusDiv = document.getElementById('status');
        const searchBtn = document.getElementById('searchBtn');
        const leadsList = document.getElementById('leadsList');
        const leadsCount = document.getElementById('leadsCount');
        const lastRunTime = document.getElementById('lastRunTime');
        const downloadBtn = document.getElementById('downloadBtn');

        searchForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            await startScrape();
        });

        downloadBtn.addEventListener('click', () => {
            window.location.href = '/api/download';
        });

        async function startScrape() {
            const businessType = document.getElementById('businessType').value;
            const location = document.getElementById('location').value;
            const limit = document.getElementById('limit').value;

            if (!businessType || !location) {
                showStatus('Please fill in all fields', 'error');
                return;
            }

            searchBtn.disabled = true;
            showStatus('<span class="spinner"></span>Searching...', 'running');
            leadsList.innerHTML = '<p style="color: #999; text-align: center;">Searching...</p>';

            try {
                const response = await fetch('/api/scrape', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ businessType, location, limit: parseInt(limit) })
                });

                const data = await response.json();

                if (response.ok) {
                    showStatus(`✅ Found ${data.leads_found} leads!`, 'success');
                    displayLeads(data.leads);
                    leadsCount.textContent = data.leads_found;
                    lastRunTime.textContent = new Date().toLocaleTimeString();
                    downloadBtn.style.display = 'block';
                } else {
                    showStatus(`❌ Error: ${data.error}`, 'error');
                }
            } catch (error) {
                showStatus(`❌ Error: ${error.message}`, 'error');
            } finally {
                searchBtn.disabled = false;
            }
        }

        function displayLeads(leads) {
            if (leads.length === 0) {
                leadsList.innerHTML = '<p style="color: #999; text-align: center;">No leads found</p>';
                return;
            }

            leadsList.innerHTML = leads.map(lead => `
                <div class="lead-item">
                    <h3>${lead.business_name || 'Unknown'}</h3>
                    <div class="lead-info">
                        <div>
                            <span class="lead-label">Phone:</span><br>
                            ${lead.phone_number || '-'}
                        </div>
                        <div>
                            <span class="lead-label">Email:</span><br>
                            ${lead.email || '-'}
                        </div>
                        <div>
                            <span class="lead-label">Website:</span><br>
                            ${lead.website ? `<a href="${lead.website}" target="_blank">${lead.website}</a>` : '-'}
                        </div>
                        <div>
                            <span class="lead-label">Location:</span><br>
                            ${lead.address || '-'}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function showStatus(message, type) {
            statusDiv.innerHTML = message;
            statusDiv.className = `status ${type}`;
            statusDiv.style.display = 'block';
        }

        // Load initial status
        async function loadStatus() {
            try {
                const response = await fetch('/api/status');
                const data = await response.json();
                leadsCount.textContent = data.leads_found;
                if (data.last_run) {
                    lastRunTime.textContent = new Date(data.last_run).toLocaleTimeString();
                }
            } catch (error) {
                console.error('Error loading status:', error);
            }
        }

        loadStatus();
    </script>
</body>
</html>
