# Lead Scraper Agent Configuration

# Search Queries - Define your lead search criteria
search_queries:
  - business_type: "HVAC companies"
    location: "Austin, TX"
    limit: 100
  
  - business_type: "Plumbers"
    location: "Austin, TX"
    limit: 100
  
  - business_type: "Electricians"
    location: "Dallas, TX"
    limit: 50

# Lead Source Configuration
lead_source:
  provider: "apify"  # Options: apify, apollo, google_places
  
  # Apify-specific config
  apify:
    actor_id: "apify/google-maps-scraper"
    country_code: "US"
    language: "en"
  
  # Apollo.io-specific config
  apollo:
    per_page: 100
    api_version: "v1"
  
  # Google Places-specific config
  google_places:
    radius: 50000  # in meters
    types: ["point_of_interest", "establishment"]

# Output Configuration
output:
  format: "json"  # Options: csv, json, both
  include_fields:
    - "business_name"
    - "phone_number"
    - "email"
    - "website"
    - "address"
    - "city"
    - "state"
    - "zip_code"
    - "scraped_at"
  
  # Google Sheets push
  google_sheets:
    enabled: true
    append_mode: true  # true = append, false = overwrite
    auto_resize_columns: true
  
  # Notion push
  notion:
    enabled: false
    database_id: null

# Deduplication
deduplication:
  enabled: true
  check_fields: ["phone_number", "email", "website"]  # Fields to check for duplicates
  history_file: "./data/leads_history.json"
  keep_history: true

# Data Cleaning
data_cleaning:
  remove_duplicates: true
  normalize_phone: true
  validate_email: true
  remove_empty_fields: true
  trim_whitespace: true

# Scheduling
scheduler:
  enabled: true
  frequency: "daily"  # Options: hourly, daily, weekly, monthly
  time: "09:00"  # 24-hour format (HH:MM)
  timezone: "America/Chicago"

# Error Handling
error_handling:
  max_retries: 3
  retry_delay: 5  # seconds
  exponential_backoff: true
  continue_on_error: true
  log_errors: true

# Logging
logging:
  level: "INFO"  # Options: DEBUG, INFO, WARNING, ERROR, CRITICAL
  format: "json"  # Options: json, text
  console_output: true
  file_output: true
  file_path: "./logs/scraper.log"
  max_file_size: 10485760  # 10 MB
  backup_count: 5
