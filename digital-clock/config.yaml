# Time zone configuration
time_zones:
  - "UTC"
  - "US/Eastern"
  - "US/Pacific"
  - "Europe/London"
  - "Europe/Paris"
  - "Asia/Tokyo"
  - "Asia/Shanghai"
  - "Australia/Sydney"

# Display settings
display:
  format: 24  # 12 or 24 hour format
  theme: "light"  # light or dark
  update_interval: 1  # seconds
  show_seconds: true
  show_date: true
  show_timezone_name: true

# Web server settings
web:
  host: "0.0.0.0"
  port: 5000
  debug: false
  threaded: true

# CLI settings
cli:
  update_interval: 1
  clear_screen: true
